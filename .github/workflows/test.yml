name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: sdk/pyproject.toml
      - name: Install base dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
      - name: Run tests
        run: |
          cd sdk
          pytest tests/ -v --tb=short

  python-all-extras:
    name: Python All-Extras Tests (3.12)
    runs-on: ubuntu-latest
    # Installs every public optional extra and runs the full suite so tests
    # that are graceful-skipped in the matrix job (numpy/sklearn-gated) are
    # exercised against real dependencies. krisp is excluded because the
    # krisp-audio SDK is proprietary and not on PyPI.
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sdk/pyproject.toml
      - name: Install base + all OSS extras
        run: |
          cd sdk
          pip install -e ".[local,dev,silero,deepfilternet,ivr,anthropic,groq,cerebras,google,cartesia,soniox,assemblyai,rime,lmnt,ultravox,gemini-live,evals,tracing,scheduling,background-audio,telnyx-ai]"
      - name: Run tests (provider+extras coverage)
        run: |
          cd sdk
          pytest tests/ -v --tb=short --cov=patter --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: sdk/coverage.xml

  typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: sdk-ts/package-lock.json
      - name: Install dependencies
        run: |
          cd sdk-ts
          npm ci
      - name: Lint
        run: |
          cd sdk-ts
          npm run lint
      - name: Test
        run: |
          cd sdk-ts
          npm test
      - name: Build
        run: |
          cd sdk-ts
          npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd sdk-ts
          npm install
      - name: Install Playwright
        run: |
          cd sdk-ts
          npx playwright install --with-deps
      - name: Run E2E tests
        run: |
          cd sdk-ts
          npx playwright test

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sdk/pyproject.toml
      - name: Install dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
      - name: Run security tests
        run: |
          cd sdk
          pytest tests/security/ -v -m security

  pre-commit:
    name: Pre-commit (lint + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install pre-commit
        run: pip install pre-commit==3.8.0
      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    # Standalone gitleaks job so the check runs even for contributors who
    # haven't installed pre-commit locally. Fails fast on any leak.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  soak:
    name: Soak Tests
    runs-on: [self-hosted, soak-runner]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install Python dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
          pip install psutil
      - name: Run Python soak tests
        run: |
          cd sdk
          pytest tests/soak/ -v -m soak 2>&1 | tee py-soak.txt
      - name: Run TypeScript soak tests
        run: |
          cd sdk-ts
          npm install
          npx vitest run tests/soak --reporter=verbose 2>&1 | tee ts-soak.txt
      - name: Upload soak results
        uses: actions/upload-artifact@v4
        with:
          name: soak-results
          path: |
            sdk/py-soak.txt
            sdk-ts/ts-soak.txt
