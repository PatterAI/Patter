name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
      - name: Run tests
        run: |
          cd sdk
          pytest tests/ -v --tb=short

  typescript:
    name: TypeScript SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          cd sdk-ts
          npm install
      - name: Lint
        run: |
          cd sdk-ts
          npm run lint
      - name: Test
        run: |
          cd sdk-ts
          npm test
      - name: Build
        run: |
          cd sdk-ts
          npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd sdk-ts
          npm install
      - name: Install Playwright
        run: |
          cd sdk-ts
          npx playwright install --with-deps
      - name: Run E2E tests
        run: |
          cd sdk-ts
          npx playwright test

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
      - name: Run security tests
        run: |
          cd sdk
          pytest tests/security/ -v -m security

  soak:
    name: Soak Tests
    runs-on: [self-hosted, soak-runner]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install Python dependencies
        run: |
          cd sdk
          pip install -e ".[local,dev]"
          pip install psutil
      - name: Run Python soak tests
        run: |
          cd sdk
          pytest tests/soak/ -v -m soak 2>&1 | tee py-soak.txt
      - name: Run TypeScript soak tests
        run: |
          cd sdk-ts
          npm install
          npx vitest run tests/soak --reporter=verbose 2>&1 | tee ts-soak.txt
      - name: Upload soak results
        uses: actions/upload-artifact@v4
        with:
          name: soak-results
          path: |
            sdk/py-soak.txt
            sdk-ts/ts-soak.txt
