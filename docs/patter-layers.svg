<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <!-- Shadows -->
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- Gradients for layers -->
    <!-- Bottom layer: Providers (warm teal/green) -->
    <linearGradient id="providerTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="providerSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="providerFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Middle layer: Patter SDK (blue/indigo) -->
    <linearGradient id="sdkTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="sdkSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="sdkFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Top layer: AI Agent (white/light) -->
    <linearGradient id="agentTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="agentSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="agentFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Background dots pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#CBD5E1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="#F8FAFC"/>
  <rect width="800" height="700" fill="url(#dots)"/>

  <!-- ============ BOTTOM LAYER: PROVIDERS ============ -->
  <g filter="url(#shadow1)" transform="translate(400, 520)">
    <!-- Right side face -->
    <path d="M0,0 L170,-85 L170,-5 C170,15 160,25 145,32 L0,80 Z" fill="url(#providerSide)" opacity="0.85"/>
    <!-- Front face -->
    <path d="M0,0 L-170,-85 L-170,-5 C-170,15 -160,25 -145,32 L0,80 Z" fill="url(#providerFront)" opacity="0.90"/>
    <!-- Top face -->
    <path d="M0,0 L170,-85 L170,-85 C170,-105 155,-115 140,-122 L0,-170 L-140,-122 C-155,-115 -170,-105 -170,-85 L-170,-85 Z" fill="url(#providerTop)"/>
    <!-- Top face rounded corners overlay -->
    <path d="M0,-170 L140,-122 C155,-115 170,-105 170,-85 L0,0 L-170,-85 C-170,-105 -155,-115 -140,-122 Z" fill="url(#providerTop)" rx="20"/>

    <!-- Provider icons on top face -->
    <!-- OpenAI-style circle -->
    <circle cx="-50" cy="-105" r="14" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <path d="M-50,-115 L-50,-95 M-60,-105 L-40,-105" stroke="white" stroke-width="2" opacity="0.7"/>

    <!-- Anthropic-style A -->
    <text x="0" y="-80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.9">A</text>

    <!-- Google-style G -->
    <text x="50" cy="-105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="18" font-weight="600" fill="white" opacity="0.9" y="-95">G</text>

    <!-- Label -->
    <text x="0" y="-55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="600" fill="white" letter-spacing="1.5" opacity="0.95">PROVIDERS</text>
  </g>

  <!-- ============ MIDDLE LAYER: PATTER SDK ============ -->
  <g filter="url(#shadow2)" transform="translate(400, 390)">
    <!-- Right side face -->
    <path d="M0,0 L170,-85 L170,-5 C170,15 160,25 145,32 L0,80 Z" fill="url(#sdkSide)" opacity="0.85"/>
    <!-- Front face -->
    <path d="M0,0 L-170,-85 L-170,-5 C-170,15 -160,25 -145,32 L0,80 Z" fill="url(#sdkFront)" opacity="0.90"/>
    <!-- Top face -->
    <path d="M0,-170 L140,-122 C155,-115 170,-105 170,-85 L0,0 L-170,-85 C-170,-105 -155,-115 -140,-122 Z" fill="url(#sdkTop)"/>

    <!-- Patter logo / code brackets on top -->
    <text x="0" y="-82" text-anchor="middle" font-family="SF Mono, Monaco, Menlo, monospace" font-size="28" font-weight="700" fill="white" opacity="0.95">&lt;P/&gt;</text>

    <!-- Label -->
    <text x="0" y="-55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="600" fill="white" letter-spacing="1.5" opacity="0.95">PATTER SDK</text>
  </g>

  <!-- ============ TOP LAYER: AI AGENT ============ -->
  <g filter="url(#shadow2)" transform="translate(400, 260)">
    <!-- Right side face -->
    <path d="M0,0 L170,-85 L170,-5 C170,15 160,25 145,32 L0,80 Z" fill="url(#agentSide)" opacity="0.90"/>
    <!-- Front face -->
    <path d="M0,0 L-170,-85 L-170,-5 C-170,15 -160,25 -145,32 L0,80 Z" fill="url(#agentFront)" opacity="0.95"/>
    <!-- Top face -->
    <path d="M0,-170 L140,-122 C155,-115 170,-105 170,-85 L0,0 L-170,-85 C-170,-105 -155,-115 -140,-122 Z" fill="url(#agentTop)"/>
    <!-- Border on top face -->
    <path d="M0,-170 L140,-122 C155,-115 170,-105 170,-85 L0,0 L-170,-85 C-170,-105 -155,-115 -140,-122 Z" fill="none" stroke="#94A3B8" stroke-width="1.5" opacity="0.4"/>

    <!-- AI Agent icon - brain/sparkle -->
    <g transform="translate(0, -100)">
      <!-- Sparkle icon -->
      <path d="M0,-22 L3,-8 L16,-5 L3,-2 L0,12 L-3,-2 L-16,-5 L-3,-8 Z" fill="#6366F1" opacity="0.85"/>
      <path d="M15,-15 L17,-10 L22,-8 L17,-6 L15,-1 L13,-6 L8,-8 L13,-10 Z" fill="#818CF8" opacity="0.7" transform="scale(0.6) translate(12, -12)"/>
    </g>

    <!-- Label -->
    <text x="0" y="-55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="16" font-weight="700" fill="#1E293B" letter-spacing="1.5" opacity="0.90">AI AGENT</text>
  </g>

  <!-- ============ SIDE LABELS ============ -->
  <!-- Right side labels with connecting lines -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" fill="#475569">
    <!-- AI Agent label -->
    <line x1="590" y1="195" x2="630" y2="195" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="640" y="190" font-size="13" font-weight="600" fill="#1E293B">Your AI Agent</text>
    <text x="640" y="208" font-size="11" fill="#64748B">Custom logic &amp; workflows</text>

    <!-- Patter SDK label -->
    <line x1="590" y1="325" x2="630" y2="325" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="640" y="320" font-size="13" font-weight="600" fill="#6366F1">Patter SDK</text>
    <text x="640" y="338" font-size="11" fill="#64748B">Unified API interface</text>

    <!-- Providers label -->
    <line x1="590" y1="455" x2="630" y2="455" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="640" y="450" font-size="13" font-weight="600" fill="#059669">Providers</text>
    <text x="640" y="468" font-size="11" fill="#64748B">OpenAI, Anthropic, Google...</text>
  </g>

  <!-- ============ ARROWS between layers ============ -->
  <g stroke="#94A3B8" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Arrow from Agent to SDK -->
    <path d="M400,270 L400,300" marker-end="url(#arrowhead)"/>
    <!-- Arrow from SDK to Providers -->
    <path d="M400,400 L400,430" marker-end="url(#arrowhead)"/>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
